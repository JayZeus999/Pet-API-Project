<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random GIF Finder</title>

  <link rel="stylesheet" href="./style.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap');
  </style>
</head>

<body>
  <img src="" alt="gif">

  <script>
    const body = document.querySelector("body");

    const title = document.createElement("h1");
    title.textContent = "Random GIF Finder";

    const img = document.querySelector("img");

    const imgBtn = document.createElement("button");
    imgBtn.textContent = "Request New Img!";

    const searchBox = document.createElement("input");
    searchBox.placeholder = "Search for gifs...";

    searchBox.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            imgBtn.click();
        }
    });

    const message = document.createElement("p");

    imgBtn.addEventListener("click", () => {
        console.log("Clicked");

        const query = searchBox.value.trim();

        if (!query) {
            alert("Please enter a search term");
            return;
        }

        message.textContent = "Loading...";
        
        async function getGIFS() {
            try {
                // returns a Promise because the internet takes time.
                const response = await fetch(
                    `https://api.giphy.com/v1/gifs/random?api_key=mEQGMgONo4mMBWoejwEASiYvDWW3UMel&tag=${query}`
                ); 
                
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
        
                // .json() itself ALSO returns a Promise.
                const gifsData = await response.json(); // That's why we need another await.

                if (!gifsData.data || !gifsData.data.images) {
                    message.textContent = "Something went wrong. Try again.";
                    img.src = "";
                    return;
                }

                message.textContent = "";

                console.log(gifsData);

                img.src = gifsData.data.images.original.url;
                
            }   catch(error) {
                console.error(error);
            }
        }

        getGIFS();
        
    });
    
    body.append(title);
    body.append(searchBox);
    body.append(imgBtn);
    body.append(img);
    body.append(message);
  </script>
</body>
</html>
